<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Loja Mods Apks | Premium Experience</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ffa3;
            --primary-glow: rgba(0, 255, 163, 0.3);
            --bg: #030712;
            --card-bg: rgba(17, 24, 39, 0.7);
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
            --sidebar-width: 280px;
            --safe-area-inset-bottom: env(safe-area-inset-bottom);
        }

        [data-theme="light"] {
            --bg: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.8);
            --text: #0f172a;
            --text-dim: #64748b;
            --glass-border: rgba(0, 0, 0, 0.08);
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            transition: background 0.4s ease;
            line-height: 1.5;
        }

        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% -20%, var(--primary-glow) 0%, transparent 70%);
            z-index: -1; pointer-events: none;
        }

        .container { 
            width: 100%; max-width: 1200px; 
            margin: 0 auto; padding: 0 16px; 
        }

        .version-badge {
            background: rgba(0, 255, 163, 0.1);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 6px 16px;
            border-radius: 100px;
            font-weight: 800; font-size: 0.7rem;
            text-transform: uppercase; letter-spacing: 1px;
        }

        h1 { 
            font-size: clamp(2rem, 8vw, 3.5rem); 
            font-weight: 800; letter-spacing: -2px; 
            line-height: 1; margin-bottom: 10px;
        }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 16px; margin-top: 30px; padding-bottom: 100px;
        }

        @media (min-width: 600px) {
            .app-grid { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 24px; }
        }

        .app-card {
            background: var(--card-bg); border-radius: 24px; padding: 20px;
            border: 1px solid var(--glass-border); backdrop-filter: blur(12px);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), border-color 0.3s;
            display: flex; flex-direction: column; align-items: center; text-align: center;
        }

        .app-card img { 
            width: clamp(60px, 15vw, 90px); 
            height: clamp(60px, 15vw, 90px);
            border-radius: 20px; margin-bottom: 15px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .search-container { position: sticky; top: 20px; z-index: 100; margin: 20px 0; }
        #searchBar {
            width: 100%; background: var(--card-bg);
            border: 1px solid var(--glass-border); padding: 18px 25px; border-radius: 20px;
            color: var(--text); backdrop-filter: blur(20px); outline: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); transition: 0.3s;
        }
        #searchBar:focus { border-color: var(--primary); box-shadow: 0 0 20px var(--primary-glow); }

        .sidebar {
            position: fixed; top: 0; right: -100%; width: 100%; max-width: var(--sidebar-width);
            height: 100%; background: var(--card-bg); backdrop-filter: blur(30px);
            z-index: 1001; padding: 30px 20px; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-left: 1px solid var(--glass-border);
        }
        .sidebar.active { right: 0; }

        /* Profile Style */
        .profile-img-preview {
            width: 80px; height: 80px; border-radius: 50%;
            object-fit: cover; border: 2px solid var(--primary);
            margin-bottom: 10px; display: inline-block;
        }

        /* Modal Styles */
        .modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
            width: 90%; max-width: 400px; background: var(--bg); border: 1px solid var(--glass-border);
            padding: 25px; border-radius: 30px; z-index: 2000; opacity: 0; visibility: hidden;
            transition: 0.3s; backdrop-filter: blur(20px);
        }
        .modal.active { opacity: 1; visibility: visible; transform: translate(-50%, -50%) scale(1); }

        .modal-input {
            width: 100%; padding: 12px; background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border); border-radius: 12px; color: white;
            margin-bottom: 20px; outline: none;
        }

        .chat-panel {
            position: fixed; inset: 0; background: var(--bg); z-index: 1100;
            display: none; flex-direction: column; 
        }
        .chat-panel.active { display: flex; animation: slideUp 0.4s ease; }

        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }

        /* Floating Action Button (FAB) */
        .fab-container {
            position: fixed; bottom: 30px; right: 20px;
            display: flex; flex-direction: column-reverse;
            align-items: center; gap: 15px; z-index: 999;
        }
        .fab-main {
            width: 60px; height: 60px; border-radius: 50%;
            background: var(--primary); color: #000;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; box-shadow: 0 10px 25px var(--primary-glow);
            cursor: pointer; transition: 0.3s; border: none;
        }
        .fab-main.active { transform: rotate(45deg); background: #ff4d4d; }

        .fab-subs {
            display: flex; flex-direction: column; gap: 10px;
            opacity: 0; visibility: hidden; transform: translateY(20px);
            transition: 0.3s;
        }
        .fab-subs.active { opacity: 1; visibility: visible; transform: translateY(0); }

        .fab-item {
            width: 50px; height: 50px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; color: #fff; text-decoration: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: 0.2s;
        }
        .fab-item:active { transform: scale(0.9); }
        .yt { background: #ff0000; }
        .tg { background: #0088cc; }

        .msg-container { display: flex; flex-direction: column; width: 100%; }
        .msg-bubble { 
            max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 0.9rem;
            background: var(--card-bg); border: 1px solid var(--glass-border);
            word-wrap: break-word;
        }
        
        .user { align-items: flex-end; }
        .user .msg-bubble { background: var(--primary); color: #000; border-bottom-right-radius: 4px; }
        
        .bot { align-items: flex-start; }
        .bot .msg-bubble { border-bottom-left-radius: 4px; }

        .chat-input-area {
            padding: 15px; background: var(--card-bg); border-top: 1px solid var(--glass-border);
            display: flex; align-items: center; gap: 10px; padding-bottom: calc(15px + var(--safe-area-inset-bottom));
        }

        .action-btn {
            width: 42px; height: 42px; border-radius: 50%; border: none;
            background: rgba(255,255,255,0.05); color: var(--text);
            display: flex; align-items: center; justify-content: center; font-size: 1.1rem; cursor: pointer;
        }

        #chatInput {
            flex: 1; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border);
            padding: 12px 20px; border-radius: 25px; color: white; outline: none;
        }

        .btn-send {
            width: 45px; height: 45px; border-radius: 50%; background: var(--primary);
            border: none; color: #000; font-size: 1.2rem; cursor: pointer;
        }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .btn-download {
            width: 100%; padding: 12px; background: var(--primary); color: #000;
            border-radius: 14px; text-decoration: none; font-weight: 800; font-size: 0.8rem;
            margin-top: auto; transition: 0.3s;
        }

        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px); display: none; z-index: 900;
        }
    </style>
</head>
<body>

<div class="bg-glow"></div>
<div id="overlay" onclick="closeAll()"></div>

<input type="file" id="fileInput" style="display: none;">
<input type="file" id="cameraInput" accept="image/*" capture="environment" style="display: none;">
<input type="file" id="profileUpload" accept="image/*" style="display: none;">

<div class="fab-container">
    <button class="fab-main" id="fabMain" onclick="toggleFab()"><i class="fa-solid fa-plus"></i></button>
    <div class="fab-subs" id="fabSubs">
        <a href="https://youtube.com/@bymodss?feature=shared" target="_blank" class="fab-item yt"><i class="fa-brands fa-youtube"></i></a>
        <a href="https://t.me/+dVYoSM1zh4xkZjEx" target="_blank" class="fab-item tg"><i class="fa-brands fa-telegram"></i></a>
    </div>
</div>

<div class="modal" id="profileModal">
    <h3 style="margin-bottom: 20px; text-align: center;">Editar Perfil</h3>
    <div style="text-align: center; margin-bottom: 15px;">
        <img id="modalPreview" src="https://via.placeholder.com/80" class="profile-img-preview" onclick="document.getElementById('profileUpload').click()">
        <p style="font-size: 0.7rem; color: var(--primary); cursor: pointer;" onclick="document.getElementById('profileUpload').click()">Trocar Foto</p>
    </div>
    <input type="text" id="newNameInput" class="modal-input" placeholder="Novo Nome...">
    <button onclick="saveProfile()" class="btn-download" style="border:none; cursor:pointer;">SALVAR ALTERAÇÕES</button>
</div>

<div class="container">
    <header style="padding: 20px 0; display: flex; justify-content: space-between; align-items: center;">
        <div class="version-badge">VERSÃO BETA 1.2</div>
        <div class="action-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars-staggered"></i></div>
    </header>

    <main style="text-align: center; margin-top: 20px;">
        <h1>MODS<span style="color: var(--primary);"> APKS</span></h1>
        <p style="color: var(--text-dim); font-weight: 500;">O melhor do Android está aqui.</p>
        
        <div class="search-container">
            <input type="text" id="searchBar" placeholder="Pesquisar aplicativos..." oninput="filterApps()">
        </div>

        <div class="app-grid" id="appGrid"></div>
    </main>
</div>

<div class="sidebar" id="sidebar">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <h2 style="font-weight: 800;">MENU</h2>
        <div class="action-btn" onclick="toggleMenu()"><i class="fa-solid fa-xmark"></i></div>
    </div>
    
    <div class="profile-section" style="margin-bottom: 20px; background: rgba(255,255,255,0.03); padding: 20px; border-radius: 20px; text-align: center;">
        <img id="sideProfileImg" src="https://img.icons8.com/bubbles/100/000000/user.png" class="profile-img-preview">
        <h3 id="userName">@CriadorBielzao</h3>
        <p style="color: var(--primary); font-size: 0.8rem; cursor: pointer; margin-top: 10px;" onclick="openProfileModal()">Editar Perfil</p>
    </div>

    <button class="sidebar-btn" onclick="toggleChat()" style="width: 100%; padding: 15px; border-radius: 15px; border: 1px solid var(--glass-border); background: none; color: white; display: flex; align-items: center; gap: 10px; margin-bottom: 10px; cursor: pointer;">
        <i class="fa-solid fa-comments" style="color: var(--primary);"></i> Grupo Chat Global
    </button>
    
    <button class="sidebar-btn" onclick="toggleTheme()" style="width: 100%; padding: 15px; border-radius: 15px; border: 1px solid var(--glass-border); background: none; color: white; display: flex; align-items: center; gap: 10px; cursor: pointer;">
        <i class="fa-solid fa-circle-half-stroke" style="color: var(--primary);"></i> Trocar Tema
    </button>
</div>

<div class="chat-panel" id="chatPanel">
    <header style="padding: 15px 20px; border-bottom: 1px solid var(--glass-border); display: flex; align-items: center; gap: 15px; background: var(--card-bg);">
        <div class="action-btn" onclick="toggleChat()"><i class="fa-solid fa-chevron-left"></i></div>
        <div>
            <h4 style="font-size: 1rem;">Chat Global</h4>
            <small style="color: var(--primary);">● 1,452 Online</small>
        </div>
    </header>

    <div class="chat-messages" id="chatMessages"></div>

    <div class="chat-input-area">
        <button class="action-btn" onclick="document.getElementById('fileInput').click()"><i class="fa-solid fa-paperclip"></i></button>
        <button class="action-btn" onclick="document.getElementById('cameraInput').click()"><i class="fa-solid fa-camera"></i></button>
        <input type="text" id="chatInput" placeholder="Sua mensagem..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button class="action-btn" id="btnAudio"><i class="fa-solid fa-microphone"></i></button>
        <button class="btn-send" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
    </div>
</div>

<script>
    const appsData = [
        { name: "Spotify Premium", mod: "Tudo Desbloqueado", img: "https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg", link: "#" },
        { name: "Netflix Mod", mod: "4K HDR Unlocked", img: "https://www.netflix.com/favicon.ico", link: "#" },
        { name: "Minecraft PE", mod: "Menu Mod / Skins", img: "https://img.icons8.com/color/512/minecraft.png", link: "#" },
        { name: "WhatsApp Aero", mod: "Anti-Ban / Temas", img: "https://img.icons8.com/color/512/whatsapp.png", link: "#" }
    ];

    const fakeUsers = [
        { name: "Lucas_Droid", emoji: "🔥" }, { name: "Ana_Modz", emoji: "✨" },
        { name: "GamerPro99", emoji: "🎮" }, { name: "MasterRoot", emoji: "🛠️" },
        { name: "Sarinha_Vip", emoji: "💎" }, { name: "Lobinho_Mods", emoji: "🐺" }
    ];

    const randomMsgs = [
        "Alguém já testou o Spotify novo?", "O Netflix tá rodando em 4K liso!",
        "Melhor loja de APK que eu já vi.", "Mano, o Minecraft tá com as skins liberadas?",
        "Traz o mod do Free Fire depois!", "Instalei o WhatsApp Aero e tá top.",
        "Alguém sabe se precisa de root?", "Tudo funcionando no meu S23."
    ];

    let myProfile = { 
        name: "@CriadorBielzao", 
        img: "https://img.icons8.com/bubbles/100/000000/user.png" 
    };

    function renderApps() {
        const grid = document.getElementById('appGrid');
        grid.innerHTML = appsData.map(app => `
            <div class="app-card" data-name="${app.name.toLowerCase()}">
                <img src="${app.img}" alt="${app.name}">
                <h3>${app.name}</h3>
                <p style="color: var(--text-dim); font-size: 0.75rem; margin-bottom: 15px;">${app.mod}</p>
                <a href="${app.link}" class="btn-download">BAIXAR</a>
            </div>
        `).join('');
    }

    function toggleFab() {
        document.getElementById('fabSubs').classList.toggle('active');
        document.getElementById('fabMain').classList.toggle('active');
    }

    function openProfileModal() {
        document.getElementById('newNameInput').value = myProfile.name;
        document.getElementById('modalPreview').src = myProfile.img;
        document.getElementById('profileModal').classList.add('active');
        document.getElementById('overlay').style.display = 'block';
    }

    document.getElementById('profileUpload').onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                document.getElementById('modalPreview').src = event.target.result;
            };
            reader.readAsDataURL(file);
        }
    };

    function saveProfile() {
        const newName = document.getElementById('newNameInput').value;
        const newImg = document.getElementById('modalPreview').src;
        
        if(newName.trim() !== "") {
            myProfile.name = newName;
            myProfile.img = newImg;
            
            document.getElementById('userName').innerText = newName;
            document.getElementById('sideProfileImg').src = newImg;
            
            closeAll();
        }
    }

    function appendMessage(name, emoji, text, type) {
        const box = document.getElementById('chatMessages');
        const div = document.createElement('div');
        div.className = `msg-container ${type}`;
        
        const icon = (type === 'user') ? `<img src="${myProfile.img}" style="width:20px;height:20px;border-radius:50%;vertical-align:middle;margin-right:5px;">` : emoji;

        div.innerHTML = `
            <small style="margin-bottom:4px; opacity:0.6; padding: 0 10px;">${icon} ${name}</small>
            <div class="msg-bubble">${text}</div>
        `;
        box.appendChild(div);
        box.scrollTo({ top: box.scrollHeight, behavior: 'smooth' });
        
        if(box.children.length > 50) box.removeChild(box.firstChild);
    }

    function sendMessage() {
        const input = document.getElementById('chatInput');
        if(!input.value.trim()) return;
        appendMessage(myProfile.name, "", input.value, 'user');
        input.value = '';
    }

    function startChatSimulation() {
        setInterval(() => {
            const user = fakeUsers[Math.floor(Math.random() * fakeUsers.length)];
            const msg = randomMsgs[Math.floor(Math.random() * randomMsgs.length)];
            appendMessage(user.name, user.emoji, msg, 'bot');
        }, 4000);
    }

    document.getElementById('fileInput').onchange = (e) => {
        if(e.target.files[0]) appendMessage(myProfile.name, "", `📁 Arquivo: ${e.target.files[0].name}`, 'user');
    };

    document.getElementById('cameraInput').onchange = (e) => {
        if(e.target.files[0]) appendMessage(myProfile.name, "", `📸 Foto enviada!`, 'user');
    };

    let isRec = false;
    document.getElementById('btnAudio').onclick = function() {
        isRec = !isRec;
        this.style.background = isRec ? '#ff4d4d' : 'rgba(255,255,255,0.05)';
        if(!isRec) appendMessage(myProfile.name, "", `🎤 Áudio enviado (0:08)`, 'user');
    };

    function toggleMenu() { 
        document.getElementById('sidebar').classList.toggle('active'); 
        document.getElementById('overlay').style.display = document.getElementById('sidebar').classList.contains('active') ? 'block' : 'none';
    }

    function toggleChat() { document.getElementById('chatPanel').classList.toggle('active'); }
    
    function closeAll() { 
        document.getElementById('sidebar').classList.remove('active'); 
        document.getElementById('profileModal').classList.remove('active');
        document.getElementById('overlay').style.display = 'none'; 
        document.getElementById('fabSubs').classList.remove('active');
        document.getElementById('fabMain').classList.remove('active');
    }
    
    function filterApps() {
        const val = document.getElementById('searchBar').value.toLowerCase();
        document.querySelectorAll('.app-card').forEach(card => {
            card.style.display = card.dataset.name.includes(val) ? 'flex' : 'none';
        });
    }

    function toggleTheme() { document.body.dataset.theme = document.body.dataset.theme === 'light' ? '' : 'light'; }

    window.onload = () => { renderApps(); startChatSimulation(); };
</script>
</body>
</html>
